name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'config/**'
      - 'docs/**'
      - 'requirements/plan.md'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'config/**'
      - 'docs/**'
      - 'requirements/plan.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-foundation:
    name: Validate TG3 Foundation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate workflow and configuration contracts
        shell: bash
        run: python scripts/validate_tg3_contracts.py

      - name: Compile Python sources when present
        shell: bash
        run: |
          if [ -d src ] || [ -d tests ]; then
            python -m compileall src tests
          else
            echo '::notice::Python source tree is not present yet; compile checks activate with TG4.'
          fi

      - name: Run unit tests when project scaffold is present
        shell: bash
        run: |
          if [ -f pyproject.toml ] && [ -d tests/unit ]; then
            python -m pip install --disable-pip-version-check . pytest
            python -m pytest -q tests/unit
          else
            echo '::notice::Python project scaffold is not present yet; unit tests activate with TG4.'
          fi