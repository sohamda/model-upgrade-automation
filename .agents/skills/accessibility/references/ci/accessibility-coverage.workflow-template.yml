name: Accessibility coverage gate (template)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  runtime-accessibility:
    name: Accessibility runtime coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_WORKDIR: .
      TARGET_BASE_URL: http://127.0.0.1:3000
      TARGET_BUILD_COMMAND: npm run build
      TARGET_SERVE_COMMAND: python -m http.server 3000 --directory dist
      TARGET_CONFIG: a11y-runtime.config.json
      TARGET_RESULTS: results.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ${{ env.TARGET_WORKDIR }}/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install target dependencies
        working-directory: ${{ env.TARGET_WORKDIR }}
        run: npm ci

      - name: Build target
        working-directory: ${{ env.TARGET_WORKDIR }}
        run: |
          echo "TODO: replace TARGET_BUILD_COMMAND with the target project's build step."
          eval "${{ env.TARGET_BUILD_COMMAND }}"

      - name: Provision system Chrome
        run: |
          set -euo pipefail
          chrome_bin="$(command -v google-chrome || command -v google-chrome-stable || true)"
          if [ -z "$chrome_bin" ]; then
            echo "::error::No system Google Chrome found on the runner."
            exit 1
          fi
          echo "Using system Chrome at: $chrome_bin"
          "$chrome_bin" --version

      - name: Serve target
        working-directory: ${{ env.TARGET_WORKDIR }}
        run: |
          echo "TODO: replace TARGET_SERVE_COMMAND and TARGET_BASE_URL with the target project's serve settings."
          eval "${{ env.TARGET_SERVE_COMMAND }}" > /tmp/a11y-runtime-serve.log 2>&1 &
          echo $! > /tmp/a11y-runtime-serve.pid
          for attempt in $(seq 1 20); do
            if curl -fsS "${{ env.TARGET_BASE_URL }}" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

      - name: Run runtime accessibility harness
        working-directory: ${{ env.TARGET_WORKDIR }}
        run: |
          if [ ! -f "${{ env.TARGET_CONFIG }}" ]; then
            echo "::warning::No a11y-runtime.config.json is committed yet; the gate activates once the target adopts it."
            exit 0
          fi
          uv run python -m runtime_a11y run-all --config "${{ env.TARGET_CONFIG }}" --out "${{ env.TARGET_RESULTS }}" --base-url "${{ env.TARGET_BASE_URL }}"

      - name: Enforce high-confidence probe failures
        if: always()
        working-directory: ${{ env.TARGET_WORKDIR }}
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          result_path = pathlib.Path("${{ env.TARGET_RESULTS }}")
          if not result_path.exists():
              print("No runtime results file found; skipping enforcement.")
              sys.exit(0)

          payload = json.loads(result_path.read_text(encoding="utf-8"))
          high_confidence = {
              "probe-axe",
              "probe-dom-hygiene",
              "probe-broken-links",
              "probe-console-errors",
              "probe-target-size",
              "probe-contrast",
              "probe-reflow-resize",
          }
          failures = []
          for item in payload.get("results", []):
              evidence = str(item.get("evidence", ""))
              if item.get("status") != "fail":
                  continue
              for probe_id in high_confidence:
                  if evidence.startswith(f"{probe_id} evaluated"):
                      failures.append(
                          f"{probe_id}: {item.get('criterionId')} ({item.get('surfaceId')}/{item.get('state')})"
                      )
                      break

          if failures:
              print("High-confidence probes reported fail cells:")
              for failure in failures:
                  print(f" - {failure}")
              sys.exit(1)

          print("No high-confidence fail cells detected.")
          PY
