<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8"><title>Combobox fixture</title></head>
  <body>
    <label for="combo">Choose a value</label>
    <input id="combo" list="values" />
    <datalist id="values">
      <option value="One"></option>
      <option value="Two"></option>
    </datalist>
  </body>
</html>
