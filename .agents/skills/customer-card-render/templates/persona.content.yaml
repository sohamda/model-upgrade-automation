slide: {{SLIDE_NUMBER}}
title: "{{TITLE}}"
section: "User Personas"
layout: "blank"

background:
  fill: "#0F1117"

elements:
  - type: textbox
    left: 0.6
    top: 0.8
    width: 12.0
    height: 0.5
    text: "{{TYPE_LABEL}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#BA8CF5"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 1.3
    width: 12.0
    height: 0.8
    text: "{{TITLE}}"
    font: "Segoe UI"
    font_size: 22
    font_color: "#FFFFFF"
    font_bold: true
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 2.2
    width: 12.0
    height: 0.4
    text: "Description"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 2.7
    width: 12.0
    height: 0.7
    text: "{{PE_DESCRIPTION}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.5
    width: 12.0
    height: 0.4
    text: "Goal"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.0
    width: 12.0
    height: 0.7
    text: "{{PE_USER_GOAL}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 4.8
    width: 12.0
    height: 0.4
    text: "Needs"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 5.3
    width: 12.0
    height: 0.7
    text: "{{PE_USER_NEEDS}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.1
    width: 12.0
    height: 0.3
    text: "Mindset"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 6.45
    width: 12.0
    height: 0.25
    text: "{{PE_USER_MINDSET}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.85
    width: 8.6
    height: 0.25
    text: "Source: {{SOURCE_PATH}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"

  - type: textbox
    left: 10.7
    top: 6.85
    width: 2.0
    height: 0.25
    text: "{{LAST_UPDATED}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"
    alignment: right
