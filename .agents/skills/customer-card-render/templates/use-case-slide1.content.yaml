slide: {{SLIDE_NUMBER}}
title: "{{TITLE}}"
section: "Use Cases"
layout: "blank"

background:
  fill: "#0F1117"

elements:
  - type: textbox
    left: 0.6
    top: 0.8
    width: 12.0
    height: 0.5
    text: "{{TYPE_LABEL}} (Part 1 of 4)"
    font: "Segoe UI"
    font_size: 10
    font_color: "#6FD2D9"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 1.3
    width: 12.0
    height: 0.8
    text: "{{TITLE}}"
    font: "Segoe UI"
    font_size: 22
    font_color: "#FFFFFF"
    font_bold: true
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 2.2
    width: 12.0
    height: 0.4
    text: "Description"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 2.7
    width: 12.0
    height: 0.8
    text: "{{UC_DESCRIPTION}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.6
    width: 12.0
    height: 0.4
    text: "Overview"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.1
    width: 12.0
    height: 0.8
    text: "{{UC_OVERVIEW}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 5.0
    width: 12.0
    height: 0.4
    text: "Business Value"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 5.5
    width: 12.0
    height: 0.9
    text: "{{UC_BUSINESS_VALUE}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.5
    width: 12.0
    height: 0.35
    text: "Source: {{SOURCE_PATH}} | {{LAST_UPDATED}}"
    font: "Segoe UI"
    font_size: 8
    font_color: "#77809A"
