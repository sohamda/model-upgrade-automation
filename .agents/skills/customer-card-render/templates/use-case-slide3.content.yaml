slide: {{SLIDE_NUMBER}}
title: "{{TITLE}}"
section: "Use Cases"
layout: "blank"

background:
  fill: "#0F1117"

elements:
  - type: textbox
    left: 0.6
    top: 0.8
    width: 12.0
    height: 0.5
    text: "{{TYPE_LABEL}} (Part 3 of 4)"
    font: "Segoe UI"
    font_size: 10
    font_color: "#6FD2D9"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 1.3
    width: 12.0
    height: 0.8
    text: "{{TITLE}}"
    font: "Segoe UI"
    font_size: 22
    font_color: "#FFFFFF"
    font_bold: true
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 2.2
    width: 5.8
    height: 0.4
    text: "Equipment Requirements"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 6.6
    top: 2.2
    width: 5.8
    height: 0.4
    text: "Operating Environment"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 2.7
    width: 5.8
    height: 0.6
    text: "{{UC_EQUIPMENT_REQUIREMENTS}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 6.6
    top: 2.7
    width: 5.8
    height: 0.6
    text: "{{UC_OPERATING_ENVIRONMENT}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 3.5
    width: 12.0
    height: 0.4
    text: "Success Criteria"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 4.0
    width: 12.0
    height: 1.0
    text: "{{UC_SUCCESS_CRITERIA}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 5.1
    width: 12.0
    height: 0.4
    text: "Pain Points"
    font: "Segoe UI"
    font_size: 12
    font_color: "#4DA3FF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 5.6
    width: 12.0
    height: 1.0
    text: "{{UC_PAIN_POINTS}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#D7DDEA"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.7
    width: 8.6
    height: 0.25
    text: "Source: {{SOURCE_PATH}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"

  - type: textbox
    left: 10.7
    top: 6.7
    width: 1.9
    height: 0.25
    text: "Last Updated: {{LAST_UPDATED}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"
