slide: {{SLIDE_NUMBER}}
title: "{{TITLE}}"
section: "Problem Statement"
layout: "blank"

background:
  fill: "#0F1117"

elements:
  - type: textbox
    left: 0.6
    top: 0.8
    width: 12.0
    height: 0.5
    text: "{{TYPE_LABEL}}"
    font: "Segoe UI"
    font_size: 10
    font_color: "#F07A4B"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 1.3
    width: 12.0
    height: 1.1
    text: "{{TITLE}}"
    font: "Segoe UI"
    font_size: 30
    font_color: "#FFFFFF"
    font_bold: true

  - type: textbox
    left: 0.6
    top: 2.6
    width: 12.0
    height: 3.9
    text: "{{P_PROBLEM_STATEMENT}}"
    font: "Segoe UI"
    font_size: 16
    font_color: "#D7DDEA"
    auto_size: "shrink"
    auto_size: "shrink"

  - type: textbox
    left: 0.6
    top: 6.9
    width: 8.6
    height: 0.25
    text: "Source: {{SOURCE_PATH}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"

  - type: textbox
    left: 10.7
    top: 6.9
    width: 2.0
    height: 0.25
    text: "{{LAST_UPDATED}}"
    font: "Segoe UI"
    font_size: 9
    font_color: "#77809A"
    alignment: right
